app = "endpoint-doctor-backend"

[build]
  builder = "flyio/nodejs"

[env]
  NODE_VERSION = "18"

[[services]]
  internal_port = 5000
  protocol = "tcp"
  
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 80
    handlers = ["http"]
  
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]